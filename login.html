<!DOCTYPE html>
<html lang="en" data-theme="dark" dir="ltr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | 3DPrint Pro</title>
    <meta name="description" content="Log in to your 3DPrint Pro client portal. Manage print queues, monitor active CAD synthesis, and check inventory.">
    <link rel="icon" type="image/svg+xml" href="logo-icon.svg">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="index.css">
    <style>
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-main);
            background-image: 
                radial-gradient(circle at 10% 20%, var(--primary-glow), transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(6, 182, 212, 0.15), transparent 40%),
                linear-gradient(var(--border) 1px, transparent 1px),
                linear-gradient(90deg, var(--border) 1px, transparent 1px);
            background-size: 100% 100%, 100% 100%, 40px 40px, 40px 40px;
            position: relative;
            transition: var(--transition);
        }

        .auth-controls {
            position: absolute;
            top: 30px;
            right: 30px;
            display: flex;
            gap: 15px;
            z-index: 100;
        }

        .icon-btn {
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text-main);
            width: 48px;
            height: 48px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: var(--transition);
            box-shadow: var(--shadow-sm);
            font-weight: 700;
            font-family: 'Outfit', sans-serif;
            font-size: 0.85rem;
            letter-spacing: 0.5px;
        }

        .icon-btn:hover {
            transform: translateY(-3px);
            border-color: var(--primary);
            color: var(--primary);
            box-shadow: var(--shadow-glow);
        }

        .auth-container {
            width: 100%;
            max-width: 480px;
            padding: 20px;
            animation: fadeIn 0.8s cubic-bezier(0.23, 1, 0.32, 1);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .auth-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            padding: 50px 40px;
            border-radius: 32px;
            backdrop-filter: blur(20px);
            box-shadow: var(--shadow-lg);
            position: relative;
            overflow: hidden;
        }

        .auth-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
        }

        .auth-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .auth-logo {
            margin-bottom: 25px;
        }

        .auth-header h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 2.5rem;
            margin-bottom: 12px;
            letter-spacing: -1px;
            color: var(--text-main);
        }

        .auth-header p {
            color: var(--text-muted);
            font-size: 1rem;
            max-width: 300px;
            margin: 0 auto;
        }

        .form-group {
            margin-bottom: 25px;
            position: relative;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--text-main);
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            transition: var(--transition);
        }

        .form-group input {
            width: 100%;
            padding: 14px 15px 14px 45px;
            background: var(--bg-main);
            border: 2px solid var(--border);
            border-radius: 14px;
            color: var(--text-main);
            font-size: 1rem;
            transition: var(--transition);
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
            background: var(--bg-card);
            box-shadow: 0 0 0 4px var(--primary-glow);
        }

        .form-group input:focus+i {
            color: var(--primary);
        }

        .forgot-pass {
            text-align: right;
            margin-top: -15px;
            margin-bottom: 25px;
        }

        .forgot-pass a {
            font-size: 0.85rem;
            color: var(--primary);
            text-decoration: none;
            transition: var(--transition);
        }

        .forgot-pass a:hover {
            text-decoration: underline;
        }

        .auth-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border: none;
            border-radius: 14px;
            color: white;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            box-shadow: 0 10px 20px -10px var(--primary);
        }

        .auth-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px -12px var(--primary);
            filter: brightness(1.1);
        }

        .auth-footer {
            text-align: center;
            margin-top: 30px;
            font-size: 0.95rem;
            color: var(--text-muted);
        }

        .auth-footer a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }

        .auth-footer a:hover {
            text-decoration: underline;
        }

        .social-auth {
            margin-top: 35px;
        }

        .social-divider {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 25px;
            color: var(--text-muted);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }

        .social-divider::before,
        .social-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .social-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }

        .social-btn {
            background: var(--bg-main);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 12px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            cursor: pointer;
            transition: var(--transition);
        }

        .social-btn:hover {
            border-color: var(--primary);
            color: var(--primary);
            background: var(--bg-card);
            transform: translateY(-2px);
            box-shadow: var(--shadow-sm);
        }

        .social-btn.google:hover { color: #DB4437; border-color: #DB4437; }
        .social-btn.apple:hover { color: #000000; border-color: #000000; }
        [data-theme="dark"] .social-btn.apple:hover { color: #ffffff; border-color: #ffffff; }
        .social-btn.facebook:hover { color: #4267B2; border-color: #4267B2; }

    </style>
</head>

<body><div class="auth-controls"><button class="icon-btn" id="rtl-toggle" title="Switch RTL/LTR" onclick="toggleDir()">LTR</button><button class="icon-btn" id="theme-toggle" title="Toggle Theme" onclick="toggleTheme()"><i class="fas fa-moon" id="theme-icon"></i></button></div><div class="auth-container"><div class="auth-card"><div class="auth-header"><div class="auth-logo"><a href="index.html" class="logo" style="justify-content: center;"><img src="logo-icon.svg" alt="3DPrint Pro" class="logo-icon"><span class="logo-text">3DPrint <span class="text-accent">Pro</span></span></a></div><h1>Welcome Back</h1><p>Login to manage your 3D creations</p></div><form action="user-dashboard.html"><div class="form-group"><label for="email">Email Address</label><div class="input-wrapper"><input type="email" id="email" placeholder="name@company.com" required><i class="fas fa-envelope"></i></div></div><div class="form-group"><label for="password">Password</label><div class="input-wrapper"><input type="password" id="password" placeholder="••••••••" required><i class="fas fa-lock"></i></div></div><div class="forgot-pass"><a href="#">Forgot password?</a></div><button type="submit" class="auth-btn">Sign In</button></form><div class="social-auth"><div class="social-divider">Or continue with</div><div class="social-grid"><button class="social-btn google" title="Login with Google"><i class="fab fa-google"></i></button><button class="social-btn apple" title="Login with Apple"><i class="fab fa-apple"></i></button><button class="social-btn facebook" title="Login with Facebook"><i class="fab fa-facebook-f"></i></button></div></div><div class="auth-footer">Don't have an account? <a href="register.html">Create one</a>
 </div></div></div><script>function toggleTheme() {
            const html=document.documentElement;
            const currentTheme=html.getAttribute('data-theme');
            const newTheme=currentTheme==='dark' ? 'light': 'dark';
            html.setAttribute('data-theme', newTheme);
            const icon=document.getElementById('theme-icon');
            icon.className=newTheme==='dark' ? 'fas fa-moon': 'fas fa-sun';

            // Save preference
            localStorage.setItem('theme', newTheme);
        }

        function toggleDir() {
            const html=document.documentElement;
            const currentDir=html.getAttribute('dir');
            const newDir=currentDir==='ltr' ? 'rtl': 'ltr';
            html.setAttribute('dir', newDir);
            document.getElementById('rtl-toggle').textContent = newDir.toUpperCase();
            localStorage.setItem('dir', newDir);
        }

        // Load preference
        const savedTheme=localStorage.getItem('theme');

        if (savedTheme) {
            document.documentElement.setAttribute('data-theme', savedTheme);
            document.getElementById('theme-icon').className=savedTheme==='dark' ? 'fas fa-moon': 'fas fa-sun';
        }

        const savedDir=localStorage.getItem('dir');

        if (savedDir) {
            document.documentElement.setAttribute('dir', savedDir);
            document.getElementById('rtl-toggle').textContent = savedDir.toUpperCase();
        } else {
            document.getElementById('rtl-toggle').textContent = 'LTR';
        }

        </script></body></html>
